name: Refresh rankings

on:
  schedule:
    - cron: '17 5 * * *'  # daily at 05:17 UTC
  workflow_dispatch:
    inputs:
      cities:
        description: 'Space-separated cities to refresh (empty = all)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: refresh-rankings
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch rankings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CITIES: ${{ github.event.inputs.cities }}
        run: |
          if [ -n "$CITIES" ]; then
            # shellcheck disable=SC2086
            node scripts/fetch.mjs $CITIES
          else
            node scripts/fetch.mjs --all
          fi

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): refresh rankings $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
