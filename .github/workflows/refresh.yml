name: Refresh rankings

on:
  schedule:
    - cron: '17 5 * * *'  # daily at 05:17 UTC
  workflow_dispatch:
    inputs:
      cities:
        description: 'Space-separated cities to refresh (empty = all)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: refresh-rankings
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restore user cache from data-cache branch
        run: |
          mkdir -p data/_cache
          if git ls-remote --exit-code --heads origin data-cache > /dev/null 2>&1; then
            git fetch origin data-cache:data-cache
            git show data-cache:data/_cache/users.json > data/_cache/users.json
            echo "Restored cache: $(wc -c < data/_cache/users.json) bytes"
          else
            echo "No data-cache branch yet; cold start."
            echo '{"version":1,"entries":{}}' > data/_cache/users.json
          fi

      - name: Fetch rankings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CITIES: ${{ github.event.inputs.cities }}
        run: |
          if [ -n "$CITIES" ]; then
            # shellcheck disable=SC2086
            node scripts/fetch.mjs $CITIES
          else
            node scripts/fetch.mjs --all
          fi

      - name: Push user cache to data-cache branch
        # Cache changes daily and would otherwise bloat main. Keep it on a
        # one-commit orphan branch — each run replaces the single commit.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ls -la data/_cache/
          SIZE=$(wc -c < data/_cache/users.json)
          echo "Cache to push: $SIZE bytes"
          if [ "$SIZE" -lt 100 ]; then
            echo "Cache suspiciously small ($SIZE bytes); skipping push."
            exit 0
          fi

          # Stash the cache file outside the worktree before we touch git.
          cp data/_cache/users.json /tmp/cache-to-push.json

          # Build a fresh orphan branch in a separate worktree, then
          # force-push it — no concern about previous commit shape.
          rm -rf ../cache-wt 2>/dev/null || true
          git worktree add --detach ../cache-wt
          cd ../cache-wt
          # The restore step earlier did `git fetch origin data-cache:data-cache`
          # so there's a local branch by that name; delete it so --orphan can claim it.
          git branch -D data-cache 2>/dev/null || true
          git checkout --orphan data-cache
          git rm -rf . > /dev/null 2>&1 || true
          mkdir -p data/_cache
          cp /tmp/cache-to-push.json data/_cache/users.json
          echo "Worktree file: $(wc -c < data/_cache/users.json) bytes"
          git add data/_cache/users.json
          git commit -m "cache: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push --force origin data-cache

      - name: Commit data changes to main
        # users.json is .gitignored on main so it isn't tracked here.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): refresh rankings $(date -u +%Y-%m-%dT%H:%MZ)"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected; rebasing on origin/main and retrying ($attempt/3)…"
            git pull --rebase --strategy-option=ours
          done
          echo "Push still failing after 3 attempts." >&2
          exit 1
