name: Refresh rankings

on:
  schedule:
    - cron: '17 5 * * *'  # daily at 05:17 UTC
  workflow_dispatch:
    inputs:
      cities:
        description: 'Space-separated cities to refresh (empty = all)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: refresh-rankings
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restore user cache from data-cache branch
        run: |
          mkdir -p data/_cache
          if git ls-remote --exit-code --heads origin data-cache > /dev/null 2>&1; then
            git fetch origin data-cache:data-cache
            git show data-cache:data/_cache/users.json > data/_cache/users.json
            echo "Restored cache: $(wc -c < data/_cache/users.json) bytes"
          else
            echo "No data-cache branch yet; cold start."
            echo '{"version":1,"entries":{}}' > data/_cache/users.json
          fi

      - name: Fetch rankings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CITIES: ${{ github.event.inputs.cities }}
        run: |
          if [ -n "$CITIES" ]; then
            # shellcheck disable=SC2086
            node scripts/fetch.mjs $CITIES
          else
            node scripts/fetch.mjs --all
          fi

      - name: Push user cache to data-cache branch
        # Cache is large (~30MB) and changes daily. Keeping it on a separate
        # orphan branch (one-commit history) avoids bloating main's history.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin data-cache > /dev/null 2>&1; then
            git worktree add ../cache-wt data-cache
          else
            git worktree add --detach ../cache-wt
            (cd ../cache-wt && git checkout --orphan data-cache && git rm -rf . >/dev/null 2>&1 || true)
          fi
          mkdir -p ../cache-wt/data/_cache
          cp data/_cache/users.json ../cache-wt/data/_cache/users.json
          cd ../cache-wt
          git add data/_cache/users.json
          if git diff --cached --quiet; then
            echo "Cache unchanged."
            exit 0
          fi
          # Squash the previous cache commit so history stays at one commit
          git commit --amend --no-edit -m "cache: $(date -u +%Y-%m-%dT%H:%MZ)" 2>/dev/null || \
            git commit -m "cache: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push --force-with-lease origin data-cache

      - name: Commit data changes to main
        # users.json is .gitignored on main so it isn't tracked here.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): refresh rankings $(date -u +%Y-%m-%dT%H:%MZ)"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected; rebasing on origin/main and retrying ($attempt/3)…"
            git pull --rebase --strategy-option=ours
          done
          echo "Push still failing after 3 attempts." >&2
          exit 1
