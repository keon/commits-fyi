<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>commits.fyi — GitHub leaderboards</title>
<meta name="description" content="Daily-refreshed rankings of GitHub users, organizations, and repositories — globally, by city, by country, by topic, by language, and trending today." />
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #fafbfc;
    --text: #1f2328;
    --muted: #6b7280;
    --border: #e5e7eb;
    --link: #0969da;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 28px 20px 96px;
  }

  header h1 {
    font-size: 20px;
    margin: 0;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  header h1 a { color: var(--text); }
  header h1 a:hover { text-decoration: none; }
  header .tag {
    color: var(--muted);
    font-size: 13px;
    margin-top: 2px;
  }

  /* Sentence-style picker */
  .sentence {
    margin: 28px 0 20px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.4;
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 0 8px;
  }
  .sentence .lead { color: var(--text); }
  .sentence .prep { color: var(--muted); font-weight: 400; font-size: 18px; }
  .dd { position: relative; display: inline-flex; align-items: baseline; }
  .dd-btn {
    background: none;
    border: none;
    color: var(--link);
    font: inherit;
    cursor: pointer;
    padding: 0;
    display: inline-flex;
    align-items: baseline;
    gap: 4px;
    border-bottom: 2px solid transparent;
    border-radius: 2px;
  }
  .dd-btn:hover { color: var(--link-hover); border-bottom-color: currentColor; }
  .dd-btn:focus { outline: 2px solid var(--link); outline-offset: 4px; }
  .dd-btn .chev { font-size: 14px; color: var(--muted); }
  .dd-panel {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    min-width: 240px;
    max-width: 320px;
    max-height: 360px;
    overflow-y: auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    padding: 4px 0;
    z-index: 60;
    font-size: 14px;
    font-weight: 400;
  }
  .dd-group {
    padding: 8px 14px 4px;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .dd-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 14px;
    cursor: pointer;
    color: var(--text);
  }
  .dd-item:hover { background: var(--bg-soft); }
  .dd-item.selected { font-weight: 600; }
  .dd-item .check { color: var(--text); font-size: 12px; }


  ol.list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  ol.list li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 4px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  ol.list li:hover { background: var(--bg-soft); }
  ol.list li:last-child { border-bottom: none; }
  .rank { color: var(--muted); font-size: 13px; min-width: 28px; font-variant-numeric: tabular-nums; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; background: var(--bg-soft); }
  .avatar.sq { border-radius: 4px; }
  .who { flex: 1; min-width: 0; }
  .who .name {
    color: var(--text);
    font-weight: 500;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .who .sub {
    color: var(--muted);
    font-size: 12px;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .metric {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    font-size: 14px;
    margin-left: auto;
    flex-shrink: 0;
  }

  .empty {
    padding: 32px 0;
    color: var(--muted);
    text-align: center;
    font-size: 13px;
  }

  footer {
    margin-top: 40px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
  footer a { color: var(--muted); text-decoration: underline; }

  /* Drawer */
  .backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 100;
  }
  .backdrop.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 100%;
    max-width: 440px;
    background: var(--bg);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform 0.18s ease-out;
    z-index: 101;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
  }
  .drawer-head .avatar { width: 44px; height: 44px; }
  .drawer-head .who-text { flex: 1; min-width: 0; }
  .drawer-head .who-text strong { font-size: 16px; display: block; overflow: hidden; text-overflow: ellipsis; }
  .drawer-head .who-text .sub { color: var(--muted); font-size: 12px; }
  .drawer-close {
    background: none; border: none;
    color: var(--muted);
    font-size: 22px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    line-height: 1;
  }
  .drawer-close:hover { background: var(--bg-soft); color: var(--text); }
  .drawer-body { padding: 16px; }
  .bio { font-size: 14px; margin-bottom: 12px; }
  .meta {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stats {
    display: flex;
    gap: 16px;
    padding: 12px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .stat .n { font-weight: 600; font-size: 18px; font-variant-numeric: tabular-nums; }
  .stat .l { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
  .section-title {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .repo {
    display: block;
    padding: 10px 0;
    border-top: 1px solid var(--border);
    color: var(--text);
    text-decoration: none;
  }
  .repo:first-of-type { border-top: none; }
  .repo:hover .name { text-decoration: underline; color: var(--link); }
  .repo .name { font-weight: 500; font-size: 14px; }
  .repo .desc {
    color: var(--muted);
    font-size: 13px;
    margin: 2px 0;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .repo .row { color: var(--muted); font-size: 12px; display: flex; gap: 12px; font-variant-numeric: tabular-nums; }
  .source { margin-top: 20px; text-align: center; color: var(--muted); font-size: 12px; }

  .embed { margin-top: 24px; }
  .embed-preview { display: flex; justify-content: center; padding: 12px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 8px; }
  .embed-preview img { max-width: 100%; height: auto; }
  .embed-snippet {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    margin-top: 8px;
    overflow-x: auto;
    white-space: nowrap;
    color: var(--text);
    cursor: pointer;
    user-select: all;
  }
  .embed-copied { color: var(--text); font-size: 11px; margin-left: 8px; opacity: 0; transition: opacity 0.15s; }
  .embed-copied.show { opacity: 1; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1><a href="?">commits.fyi</a></h1>
    <div class="tag">GitHub leaderboards · <span id="updated">refreshed daily</span></div>
  </header>

  <div class="sentence">
    <span class="lead">Top <span id="topn">100</span></span>
    <span class="dd">
      <button class="dd-btn" id="entity-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
        <span id="entity-label">Users</span><span class="chev">⌄</span>
      </button>
      <div class="dd-panel" id="entity-panel" role="listbox" hidden></div>
    </span>
    <span class="prep" id="prep">in</span>
    <span class="dd">
      <button class="dd-btn" id="filter-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
        <span id="filter-label">Worldwide</span><span class="chev">⌄</span>
      </button>
      <div class="dd-panel" id="filter-panel" role="listbox" hidden></div>
    </span>
  </div>

  <ol class="list" id="list"></ol>

  <footer>
    Daily cron · static · <a href="https://github.com/keon/commits-fyi" target="_blank" rel="noopener">source</a>
  </footer>
</div>

<div class="backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head" id="drawer-head"></div>
  <div class="drawer-body" id="drawer-body"></div>
</aside>

<script>
(() => {
  const els = {
    topn: document.getElementById('topn'),
    entityBtn: document.getElementById('entity-btn'),
    entityLabel: document.getElementById('entity-label'),
    entityPanel: document.getElementById('entity-panel'),
    filterBtn: document.getElementById('filter-btn'),
    filterLabel: document.getElementById('filter-label'),
    filterPanel: document.getElementById('filter-panel'),
    prep: document.getElementById('prep'),
    list: document.getElementById('list'),
    updated: document.getElementById('updated'),
    drawer: document.getElementById('drawer'),
    backdrop: document.getElementById('backdrop'),
    drawerHead: document.getElementById('drawer-head'),
    drawerBody: document.getElementById('drawer-body'),
  };

  const state = { index: null, route: { view: 'global', id: null, tab: null }, data: null };

  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmt = (n) => {
    if (n == null) return '—';
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
    if (n >= 10_000)    return (n / 1000).toFixed(0) + 'k';
    if (n >= 1000)      return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
    return n.toLocaleString();
  };
  const relative = (iso) => {
    if (!iso) return '';
    const m = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60); if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  };

  // ----- Routing -----
  function parseRoute() {
    const sp = new URLSearchParams(location.search);
    return { view: sp.get('v') || 'global', id: sp.get('id') || null, tab: sp.get('tab') || null };
  }
  function pushRoute(r) {
    const sp = new URLSearchParams();
    if (r.view && r.view !== 'global') sp.set('v', r.view);
    if (r.id) sp.set('id', r.id);
    if (r.tab) sp.set('tab', r.tab);
    history.pushState(r, '', sp.toString() ? `?${sp}` : location.pathname);
  }

  // ----- Mode tabs + custom picker -----
  function go(view, id) {
    state.route = { view, id: id || null, tab: null };
    pushRoute(state.route);
    loadCurrent();
  }
  // ----- Sentence: "Top N [Entity] [prep] [Filter]" -----
  //
  // Entity ∈ {users, orgs, repos}
  // Filter encodes one axis at a time: worldwide, city, country, topic,
  // language, trending. Topic/language/trending force entity=repos.

  function sentenceState() {
    const r = state.route;
    const entityFromTab = r.tab;
    const isRepoOnly = (r.view === 'topic' || r.view === 'language' || r.view === 'trending');
    const entity = isRepoOnly ? 'repos' : (entityFromTab || 'users');
    let filter;
    if (r.view === 'global')   filter = { kind: 'worldwide' };
    else if (r.view === 'city')     filter = { kind: 'city',     id: r.id };
    else if (r.view === 'country')  filter = { kind: 'country',  id: r.id };
    else if (r.view === 'topic')    filter = { kind: 'topic',    id: r.id };
    else if (r.view === 'language') filter = { kind: 'language', id: r.id };
    else if (r.view === 'trending') filter = { kind: 'trending', sub: r.tab || 'active' };
    else filter = { kind: 'worldwide' };
    return { entity, filter };
  }

  function entityLabel(entity) { return entity === 'users' ? 'Users' : entity === 'orgs' ? 'Orgs' : 'Repos'; }
  function prepFor(filter) {
    if (filter.kind === 'topic')    return 'tagged';
    if (filter.kind === 'trending') return '';
    return 'in';
  }
  function filterLabel(filter) {
    if (filter.kind === 'worldwide') return 'Worldwide';
    if (filter.kind === 'city' || filter.kind === 'country') return state.data?.name || filter.id || '…';
    if (filter.kind === 'topic')    return '#' + (filter.id || '');
    if (filter.kind === 'language') return state.data?.name || filter.id || '';
    if (filter.kind === 'trending') {
      const sub = filter.sub || 'active';
      return sub === 'active' ? 'trending today' : sub === 'new' ? 'new today' : 'surging (6mo)';
    }
    return '';
  }

  // Update top-N number from data counts.
  function topN(data, entity, filter) {
    if (!data) return 100;
    if (filter.kind === 'trending') {
      const sub = filter.sub || 'active';
      return data.counts?.[sub] || 50;
    }
    if (entity === 'orgs')  return data.counts?.orgs  || 0;
    if (entity === 'repos') return data.counts?.repos || 0;
    return data.counts?.users || 0;
  }

  function renderSentence() {
    const { entity, filter } = sentenceState();
    els.entityLabel.textContent = entityLabel(entity);
    els.filterLabel.textContent = filterLabel(filter);
    els.prep.textContent = prepFor(filter);
    els.prep.style.display = els.prep.textContent ? '' : 'none';
    els.topn.textContent = fmt(topN(state.data, entity, filter));
    renderEntityPanel(entity, filter);
    renderFilterPanel(entity, filter);
  }

  function renderEntityPanel(curEntity, curFilter) {
    // If filter is repo-only, the only option is Repos.
    const repoOnly = (curFilter.kind === 'topic' || curFilter.kind === 'language' || curFilter.kind === 'trending');
    const items = repoOnly
      ? [{ id: 'repos', label: 'Repos' }]
      : [{ id: 'users', label: 'Users' }, { id: 'orgs', label: 'Orgs' }, { id: 'repos', label: 'Repos' }];
    els.entityPanel.innerHTML = items.map(it =>
      `<div class="dd-item ${it.id === curEntity ? 'selected' : ''}" data-entity="${it.id}">
        <span>${esc(it.label)}</span>
        ${it.id === curEntity ? '<span class="check">✓</span>' : ''}
      </div>`
    ).join('');
    els.entityPanel.querySelectorAll('.dd-item').forEach(el => {
      el.addEventListener('click', () => pickEntity(el.dataset.entity));
    });
  }

  function renderFilterPanel(curEntity, curFilter) {
    const idx = state.index;
    const isCur = (kind, id, sub) =>
      curFilter.kind === kind && (id === undefined || curFilter.id === id) && (sub === undefined || curFilter.sub === sub);
    let html = '';
    const item = (label, kind, id, sub) => {
      const cur = isCur(kind, id, sub);
      const attrs = `data-kind="${kind}"${id !== undefined ? ` data-id="${esc(id || '')}"` : ''}${sub !== undefined ? ` data-sub="${sub}"` : ''}`;
      return `<div class="dd-item ${cur ? 'selected' : ''}" ${attrs}>
        <span>${esc(label)}</span>${cur ? '<span class="check">✓</span>' : ''}
      </div>`;
    };
    html += item('Worldwide', 'worldwide');
    if (idx.cities?.length) {
      html += `<div class="dd-group">Cities</div>`;
      for (const c of idx.cities) html += item(c.name, 'city', c.slug);
    }
    if (idx.countries?.length) {
      html += `<div class="dd-group">Countries</div>`;
      for (const c of idx.countries) html += item(c.name, 'country', c.slug);
    }
    if (curEntity === 'repos') {
      if (idx.topics?.length) {
        html += `<div class="dd-group">Topics</div>`;
        for (const t of idx.topics) html += item('#' + t.name, 'topic', t.slug);
      }
      if (idx.languages?.length) {
        html += `<div class="dd-group">Languages</div>`;
        for (const l of idx.languages) html += item(l.name, 'language', l.slug);
      }
      html += `<div class="dd-group">Trending</div>`;
      html += item('trending today',      'trending', undefined, 'active');
      html += item('new today',           'trending', undefined, 'new');
      html += item('surging (6 months)',  'trending', undefined, 'surging');
    }
    els.filterPanel.innerHTML = html;
    els.filterPanel.querySelectorAll('.dd-item').forEach(el => {
      el.addEventListener('click', () => pickFilter({
        kind: el.dataset.kind,
        id: el.dataset.id || null,
        sub: el.dataset.sub || null,
      }));
    });
  }

  function pickEntity(newEntity) {
    closeDropdowns();
    const { filter } = sentenceState();
    // If filter is repo-only and user picks non-repos, reset filter to worldwide.
    const repoOnly = (filter.kind === 'topic' || filter.kind === 'language' || filter.kind === 'trending');
    if (repoOnly && newEntity !== 'repos') {
      go('global', null);
      state.route.tab = newEntity;
      pushRoute(state.route);
      loadCurrent();
      return;
    }
    // Same filter, different entity → update tab only, same data.
    state.route.tab = newEntity;
    pushRoute(state.route);
    renderSentence();
    renderList();
  }

  function pickFilter(f) {
    closeDropdowns();
    const { entity } = sentenceState();
    let view, id, tab;
    if (f.kind === 'worldwide') { view = 'global';   id = null;  tab = entity; }
    else if (f.kind === 'city')      { view = 'city';     id = f.id; tab = entity; }
    else if (f.kind === 'country')   { view = 'country';  id = f.id; tab = entity; }
    else if (f.kind === 'topic')     { view = 'topic';    id = f.id; tab = null; }
    else if (f.kind === 'language')  { view = 'language'; id = f.id; tab = null; }
    else if (f.kind === 'trending')  { view = 'trending'; id = null; tab = f.sub || 'active'; }
    state.route = { view, id, tab };
    pushRoute(state.route);
    loadCurrent();
  }

  // Dropdown open/close
  function openPanel(panel, btn) { panel.hidden = false; btn.setAttribute('aria-expanded', 'true'); }
  function closePanel(panel, btn) { panel.hidden = true; btn.setAttribute('aria-expanded', 'false'); }
  function closeDropdowns() {
    closePanel(els.entityPanel, els.entityBtn);
    closePanel(els.filterPanel, els.filterBtn);
  }
  els.entityBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const wasOpen = !els.entityPanel.hidden;
    closeDropdowns();
    if (!wasOpen) openPanel(els.entityPanel, els.entityBtn);
  });
  els.filterBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const wasOpen = !els.filterPanel.hidden;
    closeDropdowns();
    if (!wasOpen) openPanel(els.filterPanel, els.filterBtn);
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.dd')) closeDropdowns();
  });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDropdowns(); });

  // ----- List -----
  function listFor(data, tab) {
    if (data.kind === 'trending') {
      if (tab === 'new')     return data.new_repos || [];
      if (tab === 'surging') return data.surging_repos || [];
      return data.active_repos || [];
    }
    if (data.kind === 'topic' || data.kind === 'language') return data.repos || [];
    if (tab === 'orgs')  return (data.orgs  || []).map(x => ({ ...x, _isOrg: true }));
    if (tab === 'repos') return data.repos || [];
    return data.users || [];
  }
  function renderList() {
    if (!state.data) return;
    const tab = state.route.tab;
    const items = listFor(state.data, tab);
    if (!items.length) { els.list.innerHTML = `<div class="empty">No results.</div>`; return; }

    const isRepoTab = tab === 'repos' || state.data.kind === 'trending' || state.data.kind === 'topic' || state.data.kind === 'language';
    els.list.innerHTML = items.map((it, i) => isRepoTab ? repoRow(it, i) : accountRow(it, i)).join('');

    els.list.querySelectorAll('li[data-login]').forEach(li => {
      li.addEventListener('click', () => openDrawer({
        login: li.dataset.login, type: li.dataset.type, name: li.dataset.name,
        avatar: li.dataset.avatar, html: li.dataset.html,
      }));
    });
  }
  function accountRow(a, i) {
    const isOrg = a._isOrg || a.type === 'Organization';
    return `<li data-login="${esc(a.login)}" data-type="${isOrg ? 'Organization' : 'User'}" data-name="${esc(a.name || '')}" data-avatar="${esc(a.avatar_url)}" data-html="${esc(a.html_url)}">
      <span class="rank">${i + 1}</span>
      <img class="avatar ${isOrg ? 'sq' : ''}" src="${esc(a.avatar_url)}&s=64" loading="lazy" alt="" />
      <div class="who">
        <span class="name">${esc(a.login)}</span>
        ${a.name ? `<span class="sub">${esc(a.name)}</span>` : ''}
      </div>
      <span class="metric">${fmt(a.followers)}</span>
    </li>`;
  }
  function repoRow(r, i) {
    return `<li>
      <span class="rank">${i + 1}</span>
      <a class="who" href="${esc(r.html_url)}" target="_blank" rel="noopener">
        <span class="name">${esc(r.full_name)}</span>
        ${r.description ? `<span class="sub">${esc(r.description)}</span>` : ''}
      </a>
      <span class="metric">${fmt(r.stargazers_count)}★</span>
    </li>`;
  }

  function renderHeader(data) {
    els.updated.textContent = `updated ${relative(data.generated_at)}`;
  }

  // ----- Loading -----
  function pathFor(r) {
    if (r.view === 'global')   return ['data/global.json', 'users'];
    if (r.view === 'trending') return ['data/trending.json', 'active'];
    if (r.view === 'city')     return [`data/cities/${r.id}.json`, 'users'];
    if (r.view === 'country')  return [`data/countries/${r.id}.json`, 'users'];
    if (r.view === 'topic')    return [`data/topics/${r.id}.json`, 'repos'];
    if (r.view === 'language') return [`data/languages/${r.id}.json`, 'repos'];
    return [null, null];
  }
  async function loadCurrent() {
    renderSentence();
    const [path, defaultTab] = pathFor(state.route);
    if (!path) { els.list.innerHTML = `<div class="empty">Unknown view.</div>`; return; }
    els.list.innerHTML = '';
    try {
      const res = await fetch(`${path}?v=${Date.now()}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      state.data = await res.json();
      if (!state.route.tab) state.route.tab = defaultTab;
      renderHeader(state.data);
      renderSentence();   // re-render with state.data.name available
      renderList();
    } catch (e) {
      els.list.innerHTML = `<div class="empty">Couldn't load ${path}. The daily cron may not have written this view yet.</div>`;
    }
  }

  // ----- Drawer -----
  let USERS_DETAIL = null, USERS_DETAIL_PROMISE = null;
  async function ensureUsersDetail() {
    if (USERS_DETAIL !== null) return USERS_DETAIL;
    if (!USERS_DETAIL_PROMISE) {
      USERS_DETAIL_PROMISE = (async () => {
        try {
          const r = await fetch(`data/users-detail.json?v=${Date.now()}`);
          USERS_DETAIL = r.ok ? await r.json() : {};
        } catch { USERS_DETAIL = {}; }
        return USERS_DETAIL;
      })();
    }
    return USERS_DETAIL_PROMISE;
  }
  async function liveProfile(login) {
    const [u, repos] = await Promise.all([
      fetch(`https://api.github.com/users/${encodeURIComponent(login)}`).then(r => r.ok ? r.json() : null),
      fetch(`https://api.github.com/users/${encodeURIComponent(login)}/repos?per_page=100&sort=updated`).then(r => r.ok ? r.json() : []),
    ]);
    if (!u) return null;
    const own = (repos || []).filter(r => !r.fork).sort((a, b) => (b.stargazers_count || 0) - (a.stargazers_count || 0));
    return {
      login: u.login, type: u.type, name: u.name, bio: u.bio,
      avatar_url: u.avatar_url, html_url: u.html_url, location: u.location, company: u.company,
      created_at: u.created_at,
      followers: u.followers, public_repos: u.public_repos,
      total_stars: own.reduce((s, r) => s + (r.stargazers_count || 0), 0),
      top_repos: own.slice(0, 6).map(r => ({
        full_name: r.full_name, html_url: r.html_url, description: r.description,
        stargazers_count: r.stargazers_count, forks_count: r.forks_count, language: r.language,
      })),
    };
  }
  function closeDrawer() {
    els.drawer.classList.remove('open');
    els.backdrop.classList.remove('open');
    els.drawer.setAttribute('aria-hidden', 'true');
  }
  els.backdrop.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });

  function drawerHeadHTML(p) {
    const isOrg = p.type === 'Organization';
    return `
      <img class="avatar ${isOrg ? 'sq' : ''}" src="${esc(p.avatar_url)}&s=88" alt="" />
      <div class="who-text">
        <strong><a href="${esc(p.html_url)}" target="_blank" rel="noopener">${esc(p.login)}</a></strong>
        ${p.name ? `<div class="sub">${esc(p.name)}</div>` : ''}
      </div>
      <button class="drawer-close" type="button" aria-label="Close">×</button>
    `;
  }
  function drawerBodyHTML(p) {
    const meta = [];
    if (p.location) meta.push(`📍 ${esc(p.location)}`);
    if (p.company)  meta.push(`🏢 ${esc(p.company)}`);
    if (p.created_at) {
      const yrs = Math.floor((Date.now() - new Date(p.created_at).getTime()) / (365.25 * 24 * 60 * 60 * 1000));
      meta.push(`📅 Joined ${new Date(p.created_at).getUTCFullYear()} (${yrs} yr${yrs === 1 ? '' : 's'})`);
    }
    const repos = (p.top_repos || []).map(r => `
      <a class="repo" href="${esc(r.html_url)}" target="_blank" rel="noopener">
        <div class="name">${esc(r.full_name)}</div>
        ${r.description ? `<div class="desc">${esc(r.description)}</div>` : ''}
        <div class="row">★ ${fmt(r.stargazers_count)} · ⑂ ${fmt(r.forks_count)}${r.language ? ` · ${esc(r.language)}` : ''}</div>
      </a>
    `).join('');
    return `
      ${p.bio ? `<div class="bio">${esc(p.bio)}</div>` : ''}
      ${meta.length ? `<div class="meta">${meta.map(m => `<div>${m}</div>`).join('')}</div>` : ''}
      <div class="stats">
        <div class="stat"><div class="n">${fmt(p.followers)}</div><div class="l">Followers</div></div>
        <div class="stat"><div class="n">${fmt(p.total_stars)}</div><div class="l">Stars</div></div>
        <div class="stat"><div class="n">${fmt(p.public_repos)}</div><div class="l">Repos</div></div>
      </div>
      ${repos ? `<div class="section-title">Top repositories</div>${repos}` : `<div class="empty">No public repositories.</div>`}
      <div class="embed">
        <div class="section-title">Embed in your README</div>
        <div class="embed-preview"><img src="badges/${esc(p.login)}.svg" alt="commits.fyi badge for ${esc(p.login)}" loading="lazy" onerror="this.parentElement.innerHTML='<div style=\\'color:var(--muted);font-size:12px\\'>Badge for this account will be generated on the next daily refresh.</div>'"/></div>
        <div class="embed-snippet" id="embed-snippet" title="Click to copy">[![commits.fyi](https://commits.fyi/badges/${esc(p.login)}.svg)](https://commits.fyi/)</div>
      </div>
      <div class="source"><a href="${esc(p.html_url)}" target="_blank" rel="noopener">Open on GitHub →</a></div>
    `;
  }
  async function openDrawer(stub) {
    els.drawer.classList.add('open');
    els.backdrop.classList.add('open');
    els.drawer.setAttribute('aria-hidden', 'false');
    els.drawerHead.innerHTML = drawerHeadHTML({ login: stub.login, type: stub.type, name: stub.name, html_url: stub.html, avatar_url: stub.avatar });
    els.drawerHead.querySelector('.drawer-close').addEventListener('click', closeDrawer);
    els.drawerBody.innerHTML = `<div class="empty">Loading…</div>`;
    const detail = await ensureUsersDetail();
    let p = detail[stub.login];
    if (!p) {
      els.drawerBody.innerHTML = `<div class="empty">Fetching ${esc(stub.login)} from GitHub…</div>`;
      p = await liveProfile(stub.login).catch(() => null);
    }
    if (!p) { els.drawerBody.innerHTML = `<div class="empty">Profile not found.</div>`; return; }
    els.drawerHead.innerHTML = drawerHeadHTML(p);
    els.drawerHead.querySelector('.drawer-close').addEventListener('click', closeDrawer);
    els.drawerBody.innerHTML = drawerBodyHTML(p);
    const snip = document.getElementById('embed-snippet');
    if (snip) snip.addEventListener('click', () => {
      navigator.clipboard?.writeText(snip.textContent).catch(() => {});
      const before = snip.style.color;
      snip.style.color = 'var(--link)';
      setTimeout(() => snip.style.color = before, 400);
    });
  }

  // ----- Init -----
  window.addEventListener('popstate', () => { state.route = parseRoute(); loadCurrent(); });
  (async () => {
    try {
      const res = await fetch(`data/index.json?v=${Date.now()}`);
      if (!res.ok) throw new Error('index.json missing');
      state.index = await res.json();
      state.route = parseRoute();
      await loadCurrent();
    } catch (e) {
      els.list.innerHTML = `<div class="empty">Couldn't load data/index.json. (${esc(e.message)})</div>`;
    }
  })();
})();
</script>
</body>
</html>
