<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>commits.fyi — GitHub leaderboards</title>
<meta name="description" content="Daily-refreshed rankings of GitHub users, organizations, and repositories — globally, by city, by country, by topic, by language, and trending today." />
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #fafbfc;
    --text: #1f2328;
    --muted: #6b7280;
    --border: #e5e7eb;
    --link: #0969da;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 28px 20px 96px;
  }

  header h1 {
    font-size: 20px;
    margin: 0;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  header h1 a { color: var(--text); }
  header h1 a:hover { text-decoration: none; }
  header .tag {
    color: var(--muted);
    font-size: 13px;
    margin-top: 2px;
  }

  /* Mode tabs */
  nav.modes {
    margin-top: 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px 18px;
    font-size: 14px;
    color: var(--muted);
  }
  nav.modes a {
    color: var(--muted);
    cursor: pointer;
    padding: 4px 0;
    border-bottom: 1.5px solid transparent;
  }
  nav.modes a:hover { color: var(--text); text-decoration: none; }
  nav.modes a.active { color: var(--text); border-bottom-color: var(--text); font-weight: 600; }

  /* Custom picker: trigger doubles as the page title */
  .picker { position: relative; margin: 12px 0 4px; }
  .picker-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    padding: 0;
    color: var(--text);
    font-family: inherit;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.01em;
    cursor: pointer;
    max-width: 100%;
  }
  .picker-btn .chev { font-size: 16px; color: var(--muted); transform: translateY(-1px); }
  .picker-btn:hover { color: var(--link); }
  .picker-btn:focus { outline: 2px solid var(--link); outline-offset: 4px; border-radius: 4px; }
  .picker-btn[disabled] { cursor: default; opacity: 0.6; }
  .picker-btn[disabled] .chev { display: none; }

  .picker-panel {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    min-width: 260px;
    max-width: 360px;
    max-height: 380px;
    overflow-y: auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    padding: 4px 0;
    z-index: 60;
  }
  .picker-group {
    padding: 6px 14px 4px;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }
  .picker-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
  }
  .picker-item:hover, .picker-item.kbd { background: var(--bg-soft); }
  .picker-item.selected { color: var(--text); font-weight: 600; }
  .picker-item .check { color: var(--text); font-size: 12px; }

  .page-sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 16px;
  }

  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .tabs button {
    background: none;
    border: none;
    color: var(--muted);
    padding: 10px 12px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    font-family: inherit;
  }
  .tabs button:hover { color: var(--text); }
  .tabs button.active { color: var(--text); border-bottom-color: var(--text); }
  .tabs button .n { color: var(--muted); font-weight: 400; margin-left: 4px; }

  ol.list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  ol.list li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 4px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  ol.list li:hover { background: var(--bg-soft); }
  ol.list li:last-child { border-bottom: none; }
  .rank { color: var(--muted); font-size: 13px; min-width: 28px; font-variant-numeric: tabular-nums; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; background: var(--bg-soft); }
  .avatar.sq { border-radius: 4px; }
  .who { flex: 1; min-width: 0; }
  .who .name {
    color: var(--text);
    font-weight: 500;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .who .sub {
    color: var(--muted);
    font-size: 12px;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .metric {
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    font-size: 14px;
    margin-left: auto;
    flex-shrink: 0;
  }

  .empty {
    padding: 32px 0;
    color: var(--muted);
    text-align: center;
    font-size: 13px;
  }

  footer {
    margin-top: 40px;
    color: var(--muted);
    font-size: 12px;
    text-align: center;
  }
  footer a { color: var(--muted); text-decoration: underline; }

  /* Drawer */
  .backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 100;
  }
  .backdrop.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 100%;
    max-width: 440px;
    background: var(--bg);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform 0.18s ease-out;
    z-index: 101;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
  }
  .drawer-head .avatar { width: 44px; height: 44px; }
  .drawer-head .who-text { flex: 1; min-width: 0; }
  .drawer-head .who-text strong { font-size: 16px; display: block; overflow: hidden; text-overflow: ellipsis; }
  .drawer-head .who-text .sub { color: var(--muted); font-size: 12px; }
  .drawer-close {
    background: none; border: none;
    color: var(--muted);
    font-size: 22px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    line-height: 1;
  }
  .drawer-close:hover { background: var(--bg-soft); color: var(--text); }
  .drawer-body { padding: 16px; }
  .bio { font-size: 14px; margin-bottom: 12px; }
  .meta {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stats {
    display: flex;
    gap: 16px;
    padding: 12px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .stat .n { font-weight: 600; font-size: 18px; font-variant-numeric: tabular-nums; }
  .stat .l { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
  .section-title {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .repo {
    display: block;
    padding: 10px 0;
    border-top: 1px solid var(--border);
    color: var(--text);
    text-decoration: none;
  }
  .repo:first-of-type { border-top: none; }
  .repo:hover .name { text-decoration: underline; color: var(--link); }
  .repo .name { font-weight: 500; font-size: 14px; }
  .repo .desc {
    color: var(--muted);
    font-size: 13px;
    margin: 2px 0;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .repo .row { color: var(--muted); font-size: 12px; display: flex; gap: 12px; font-variant-numeric: tabular-nums; }
  .source { margin-top: 20px; text-align: center; color: var(--muted); font-size: 12px; }

  .embed { margin-top: 24px; }
  .embed-preview { display: flex; justify-content: center; padding: 12px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: 8px; }
  .embed-preview img { max-width: 100%; height: auto; }
  .embed-snippet {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    margin-top: 8px;
    overflow-x: auto;
    white-space: nowrap;
    color: var(--text);
    cursor: pointer;
    user-select: all;
  }
  .embed-copied { color: var(--text); font-size: 11px; margin-left: 8px; opacity: 0; transition: opacity 0.15s; }
  .embed-copied.show { opacity: 1; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1><a href="?">commits.fyi</a></h1>
    <div class="tag">GitHub leaderboards · <span id="updated">refreshed daily</span></div>
  </header>

  <nav class="modes" id="modes"></nav>

  <div class="picker" id="picker">
    <button class="picker-btn" id="picker-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
      <span id="picker-label">Loading…</span>
      <span class="chev" aria-hidden="true">⌄</span>
    </button>
    <div class="picker-panel" id="picker-panel" role="listbox" hidden></div>
  </div>

  <div class="page-sub" id="subtitle"></div>

  <div class="tabs" id="tabs"></div>

  <ol class="list" id="list"></ol>

  <footer>
    Daily cron · static · <a href="https://github.com/keon/commits-fyi" target="_blank" rel="noopener">source</a>
  </footer>
</div>

<div class="backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head" id="drawer-head"></div>
  <div class="drawer-body" id="drawer-body"></div>
</aside>

<script>
(() => {
  const els = {
    modes: document.getElementById('modes'),
    picker: document.getElementById('picker'),
    pickerBtn: document.getElementById('picker-btn'),
    pickerLabel: document.getElementById('picker-label'),
    pickerPanel: document.getElementById('picker-panel'),
    subtitle: document.getElementById('subtitle'),
    tabs: document.getElementById('tabs'),
    list: document.getElementById('list'),
    updated: document.getElementById('updated'),
    drawer: document.getElementById('drawer'),
    backdrop: document.getElementById('backdrop'),
    drawerHead: document.getElementById('drawer-head'),
    drawerBody: document.getElementById('drawer-body'),
  };

  const state = { index: null, route: { view: 'global', id: null, tab: null }, data: null };

  const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const fmt = (n) => {
    if (n == null) return '—';
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
    if (n >= 10_000)    return (n / 1000).toFixed(0) + 'k';
    if (n >= 1000)      return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
    return n.toLocaleString();
  };
  const relative = (iso) => {
    if (!iso) return '';
    const m = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60); if (h < 24) return `${h}h ago`;
    return `${Math.floor(h / 24)}d ago`;
  };

  // ----- Routing -----
  function parseRoute() {
    const sp = new URLSearchParams(location.search);
    return { view: sp.get('v') || 'global', id: sp.get('id') || null, tab: sp.get('tab') || null };
  }
  function pushRoute(r) {
    const sp = new URLSearchParams();
    if (r.view && r.view !== 'global') sp.set('v', r.view);
    if (r.id) sp.set('id', r.id);
    if (r.tab) sp.set('tab', r.tab);
    history.pushState(r, '', sp.toString() ? `?${sp}` : location.pathname);
  }

  // ----- Mode tabs + custom picker -----
  function go(view, id) {
    state.route = { view, id: id || null, tab: null };
    pushRoute(state.route);
    loadCurrent();
  }
  function modeForView(view) {
    if (view === 'topic')    return 'topic';
    if (view === 'language') return 'language';
    if (view === 'trending') return 'trending';
    return 'location';
  }

  // The four modes. `trending` has no value picker — clicking just navigates.
  const MODES = [
    { id: 'location', label: 'Location' },
    { id: 'topic',    label: 'Topic' },
    { id: 'language', label: 'Language' },
    { id: 'trending', label: 'Trending' },
  ];

  function renderModes() {
    const active = modeForView(state.route.view);
    els.modes.innerHTML = MODES.map(m =>
      `<a data-mode="${m.id}" class="${m.id === active ? 'active' : ''}">${esc(m.label)}</a>`
    ).join('');
    els.modes.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => onModeClick(a.dataset.mode));
    });
  }

  function onModeClick(mode) {
    if (mode === 'trending') { closePicker(); go('trending'); return; }
    if (mode === 'location') {
      // No-op if already on a location view — let user open the picker instead.
      if (modeForView(state.route.view) === 'location') { togglePicker(); return; }
      // Default location target: Global.
      go('global');
      return;
    }
    if (mode === 'topic' || mode === 'language') {
      // If already on this mode, just toggle the picker.
      if (state.route.view === mode) { togglePicker(); return; }
      // Otherwise switch to a fresh picker so user can pick a value.
      state.route = { view: mode, id: null, tab: null };
      // Don't navigate yet (no id) — just show picker open. UI updates via renderPicker.
      renderPicker();
      openPicker();
    }
  }

  function pickerLabelFor(view, id) {
    if (view === 'trending') return 'Trending today';
    if (view === 'global')   return 'Global';
    if (view === 'city')     return state.data?.name || id || '';
    if (view === 'country')  return state.data?.name || id || '';
    if (view === 'topic')    return id ? '#' + id : 'Choose a topic';
    if (view === 'language') return id ? (state.data?.name || id) : 'Choose a language';
    return '';
  }

  function renderPicker() {
    const r = state.route;
    const mode = modeForView(r.view);
    els.pickerLabel.textContent = pickerLabelFor(r.view, r.id);
    // Trending has no picker — hide the chev and disable.
    if (mode === 'trending') {
      els.pickerBtn.disabled = true;
      els.pickerBtn.setAttribute('aria-expanded', 'false');
    } else {
      els.pickerBtn.disabled = false;
    }
    populatePanel(mode);
  }

  function populatePanel(mode) {
    const idx = state.index, r = state.route;
    let html = '';
    const item = (label, view, id, current) => `
      <div class="picker-item ${current ? 'selected' : ''}" data-view="${view}" data-id="${esc(id || '')}" role="option">
        <span>${esc(label)}</span>
        ${current ? '<span class="check">✓</span>' : ''}
      </div>`;
    if (mode === 'location') {
      html += item('Global', 'global', null, r.view === 'global');
      if (idx.cities?.length) {
        html += `<div class="picker-group">Cities</div>`;
        for (const c of idx.cities) html += item(c.name, 'city', c.slug, r.view === 'city' && r.id === c.slug);
      }
      if (idx.countries?.length) {
        html += `<div class="picker-group">Countries</div>`;
        for (const c of idx.countries) html += item(c.name, 'country', c.slug, r.view === 'country' && r.id === c.slug);
      }
    } else if (mode === 'topic') {
      for (const t of (idx.topics || [])) html += item('#' + t.name, 'topic', t.slug, r.view === 'topic' && r.id === t.slug);
    } else if (mode === 'language') {
      for (const l of (idx.languages || [])) html += item(l.name, 'language', l.slug, r.view === 'language' && r.id === l.slug);
    }
    els.pickerPanel.innerHTML = html;
    els.pickerPanel.querySelectorAll('.picker-item').forEach(el => {
      el.addEventListener('click', () => {
        closePicker();
        go(el.dataset.view, el.dataset.id || null);
      });
    });
  }

  function openPicker() {
    if (els.pickerBtn.disabled) return;
    els.pickerPanel.hidden = false;
    els.pickerBtn.setAttribute('aria-expanded', 'true');
  }
  function closePicker() {
    els.pickerPanel.hidden = true;
    els.pickerBtn.setAttribute('aria-expanded', 'false');
  }
  function togglePicker() { els.pickerPanel.hidden ? openPicker() : closePicker(); }

  els.pickerBtn.addEventListener('click', togglePicker);
  document.addEventListener('click', (e) => {
    if (!els.picker.contains(e.target)) closePicker();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !els.pickerPanel.hidden) closePicker();
  });

  // ----- Tabs -----
  function tabsFor(data) {
    if (data.kind === 'trending') {
      const t = [
        { id: 'active', label: 'Active', count: data.counts.active },
        { id: 'new',    label: 'New',    count: data.counts.new },
      ];
      if (data.counts.surging != null) t.push({ id: 'surging', label: 'Surging', count: data.counts.surging });
      return t;
    }
    if (data.kind === 'topic' || data.kind === 'language') {
      return [{ id: 'repos', label: 'Repos', count: data.counts.repos }];
    }
    return [
      { id: 'users', label: 'Users', count: data.counts.users },
      { id: 'orgs',  label: 'Orgs',  count: data.counts.orgs },
      { id: 'repos', label: 'Repos', count: data.counts.repos },
    ];
  }
  function renderTabs(data, activeId) {
    const tabs = tabsFor(data);
    els.tabs.innerHTML = tabs.map(t => `
      <button data-tab="${t.id}" class="${t.id === activeId ? 'active' : ''}">${esc(t.label)}<span class="n">${fmt(t.count)}</span></button>
    `).join('');
    els.tabs.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => {
        state.route.tab = b.dataset.tab;
        pushRoute(state.route);
        els.tabs.querySelectorAll('button').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        renderList();
      });
    });
  }

  // ----- List -----
  function listFor(data, tab) {
    if (data.kind === 'trending') {
      if (tab === 'new')     return data.new_repos || [];
      if (tab === 'surging') return data.surging_repos || [];
      return data.active_repos || [];
    }
    if (data.kind === 'topic' || data.kind === 'language') return data.repos || [];
    if (tab === 'orgs')  return (data.orgs  || []).map(x => ({ ...x, _isOrg: true }));
    if (tab === 'repos') return data.repos || [];
    return data.users || [];
  }
  function renderList() {
    if (!state.data) return;
    const tab = state.route.tab;
    const items = listFor(state.data, tab);
    if (!items.length) { els.list.innerHTML = `<div class="empty">No results.</div>`; return; }

    const isRepoTab = tab === 'repos' || state.data.kind === 'trending' || state.data.kind === 'topic' || state.data.kind === 'language';
    els.list.innerHTML = items.map((it, i) => isRepoTab ? repoRow(it, i) : accountRow(it, i)).join('');

    els.list.querySelectorAll('li[data-login]').forEach(li => {
      li.addEventListener('click', () => openDrawer({
        login: li.dataset.login, type: li.dataset.type, name: li.dataset.name,
        avatar: li.dataset.avatar, html: li.dataset.html,
      }));
    });
  }
  function accountRow(a, i) {
    const isOrg = a._isOrg || a.type === 'Organization';
    return `<li data-login="${esc(a.login)}" data-type="${isOrg ? 'Organization' : 'User'}" data-name="${esc(a.name || '')}" data-avatar="${esc(a.avatar_url)}" data-html="${esc(a.html_url)}">
      <span class="rank">${i + 1}</span>
      <img class="avatar ${isOrg ? 'sq' : ''}" src="${esc(a.avatar_url)}&s=64" loading="lazy" alt="" />
      <div class="who">
        <span class="name">${esc(a.login)}</span>
        ${a.name ? `<span class="sub">${esc(a.name)}</span>` : ''}
      </div>
      <span class="metric">${fmt(a.followers)}</span>
    </li>`;
  }
  function repoRow(r, i) {
    return `<li>
      <span class="rank">${i + 1}</span>
      <a class="who" href="${esc(r.html_url)}" target="_blank" rel="noopener">
        <span class="name">${esc(r.full_name)}</span>
        ${r.description ? `<span class="sub">${esc(r.description)}</span>` : ''}
      </a>
      <span class="metric">${fmt(r.stargazers_count)}★</span>
    </li>`;
  }

  // ----- Subtitle (title is the dropdown now) -----
  function renderHeader(data) {
    const subs = {
      global:    'Top GitHub accounts, worldwide.',
      trending:  'Repos created or active in the last 24 hours.',
      city:      `Top GitHub accounts in ${data.name}.`,
      country:   `Top GitHub accounts in ${data.name}.`,
      topic:     `Most-starred repos tagged ${data.name}.`,
      language:  `Most-starred ${data.name} repos.`,
    };
    els.subtitle.textContent = subs[data.kind] || '';
    els.updated.textContent = `updated ${relative(data.generated_at)}`;
  }

  // ----- Loading -----
  function pathFor(r) {
    if (r.view === 'global')   return ['data/global.json', 'users'];
    if (r.view === 'trending') return ['data/trending.json', 'active'];
    if (r.view === 'city')     return [`data/cities/${r.id}.json`, 'users'];
    if (r.view === 'country')  return [`data/countries/${r.id}.json`, 'users'];
    if (r.view === 'topic')    return [`data/topics/${r.id}.json`, 'repos'];
    if (r.view === 'language') return [`data/languages/${r.id}.json`, 'repos'];
    return [null, null];
  }
  async function loadCurrent() {
    renderModes();
    renderPicker();
    const [path, defaultTab] = pathFor(state.route);
    if (!path) { els.list.innerHTML = `<div class="empty">Unknown view.</div>`; return; }
    els.subtitle.textContent = '';
    els.tabs.innerHTML = '';
    els.list.innerHTML = '';
    try {
      const res = await fetch(`${path}?v=${Date.now()}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      state.data = await res.json();
      if (!state.route.tab) state.route.tab = defaultTab;
      renderHeader(state.data);
      renderPicker();   // re-render now that state.data.name is available
      renderTabs(state.data, state.route.tab);
      renderList();
    } catch (e) {
      els.list.innerHTML = `<div class="empty">Couldn't load ${path}. The daily cron may not have written this view yet.</div>`;
    }
  }

  // ----- Drawer -----
  let USERS_DETAIL = null, USERS_DETAIL_PROMISE = null;
  async function ensureUsersDetail() {
    if (USERS_DETAIL !== null) return USERS_DETAIL;
    if (!USERS_DETAIL_PROMISE) {
      USERS_DETAIL_PROMISE = (async () => {
        try {
          const r = await fetch(`data/users-detail.json?v=${Date.now()}`);
          USERS_DETAIL = r.ok ? await r.json() : {};
        } catch { USERS_DETAIL = {}; }
        return USERS_DETAIL;
      })();
    }
    return USERS_DETAIL_PROMISE;
  }
  async function liveProfile(login) {
    const [u, repos] = await Promise.all([
      fetch(`https://api.github.com/users/${encodeURIComponent(login)}`).then(r => r.ok ? r.json() : null),
      fetch(`https://api.github.com/users/${encodeURIComponent(login)}/repos?per_page=100&sort=updated`).then(r => r.ok ? r.json() : []),
    ]);
    if (!u) return null;
    const own = (repos || []).filter(r => !r.fork).sort((a, b) => (b.stargazers_count || 0) - (a.stargazers_count || 0));
    return {
      login: u.login, type: u.type, name: u.name, bio: u.bio,
      avatar_url: u.avatar_url, html_url: u.html_url, location: u.location, company: u.company,
      created_at: u.created_at,
      followers: u.followers, public_repos: u.public_repos,
      total_stars: own.reduce((s, r) => s + (r.stargazers_count || 0), 0),
      top_repos: own.slice(0, 6).map(r => ({
        full_name: r.full_name, html_url: r.html_url, description: r.description,
        stargazers_count: r.stargazers_count, forks_count: r.forks_count, language: r.language,
      })),
    };
  }
  function closeDrawer() {
    els.drawer.classList.remove('open');
    els.backdrop.classList.remove('open');
    els.drawer.setAttribute('aria-hidden', 'true');
  }
  els.backdrop.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });

  function drawerHeadHTML(p) {
    const isOrg = p.type === 'Organization';
    return `
      <img class="avatar ${isOrg ? 'sq' : ''}" src="${esc(p.avatar_url)}&s=88" alt="" />
      <div class="who-text">
        <strong><a href="${esc(p.html_url)}" target="_blank" rel="noopener">${esc(p.login)}</a></strong>
        ${p.name ? `<div class="sub">${esc(p.name)}</div>` : ''}
      </div>
      <button class="drawer-close" type="button" aria-label="Close">×</button>
    `;
  }
  function drawerBodyHTML(p) {
    const meta = [];
    if (p.location) meta.push(`📍 ${esc(p.location)}`);
    if (p.company)  meta.push(`🏢 ${esc(p.company)}`);
    if (p.created_at) {
      const yrs = Math.floor((Date.now() - new Date(p.created_at).getTime()) / (365.25 * 24 * 60 * 60 * 1000));
      meta.push(`📅 Joined ${new Date(p.created_at).getUTCFullYear()} (${yrs} yr${yrs === 1 ? '' : 's'})`);
    }
    const repos = (p.top_repos || []).map(r => `
      <a class="repo" href="${esc(r.html_url)}" target="_blank" rel="noopener">
        <div class="name">${esc(r.full_name)}</div>
        ${r.description ? `<div class="desc">${esc(r.description)}</div>` : ''}
        <div class="row">★ ${fmt(r.stargazers_count)} · ⑂ ${fmt(r.forks_count)}${r.language ? ` · ${esc(r.language)}` : ''}</div>
      </a>
    `).join('');
    return `
      ${p.bio ? `<div class="bio">${esc(p.bio)}</div>` : ''}
      ${meta.length ? `<div class="meta">${meta.map(m => `<div>${m}</div>`).join('')}</div>` : ''}
      <div class="stats">
        <div class="stat"><div class="n">${fmt(p.followers)}</div><div class="l">Followers</div></div>
        <div class="stat"><div class="n">${fmt(p.total_stars)}</div><div class="l">Stars</div></div>
        <div class="stat"><div class="n">${fmt(p.public_repos)}</div><div class="l">Repos</div></div>
      </div>
      ${repos ? `<div class="section-title">Top repositories</div>${repos}` : `<div class="empty">No public repositories.</div>`}
      <div class="embed">
        <div class="section-title">Embed in your README</div>
        <div class="embed-preview"><img src="badges/${esc(p.login)}.svg" alt="commits.fyi badge for ${esc(p.login)}" loading="lazy" onerror="this.parentElement.innerHTML='<div style=\\'color:var(--muted);font-size:12px\\'>Badge for this account will be generated on the next daily refresh.</div>'"/></div>
        <div class="embed-snippet" id="embed-snippet" title="Click to copy">[![commits.fyi](https://commits.fyi/badges/${esc(p.login)}.svg)](https://commits.fyi/)</div>
      </div>
      <div class="source"><a href="${esc(p.html_url)}" target="_blank" rel="noopener">Open on GitHub →</a></div>
    `;
  }
  async function openDrawer(stub) {
    els.drawer.classList.add('open');
    els.backdrop.classList.add('open');
    els.drawer.setAttribute('aria-hidden', 'false');
    els.drawerHead.innerHTML = drawerHeadHTML({ login: stub.login, type: stub.type, name: stub.name, html_url: stub.html, avatar_url: stub.avatar });
    els.drawerHead.querySelector('.drawer-close').addEventListener('click', closeDrawer);
    els.drawerBody.innerHTML = `<div class="empty">Loading…</div>`;
    const detail = await ensureUsersDetail();
    let p = detail[stub.login];
    if (!p) {
      els.drawerBody.innerHTML = `<div class="empty">Fetching ${esc(stub.login)} from GitHub…</div>`;
      p = await liveProfile(stub.login).catch(() => null);
    }
    if (!p) { els.drawerBody.innerHTML = `<div class="empty">Profile not found.</div>`; return; }
    els.drawerHead.innerHTML = drawerHeadHTML(p);
    els.drawerHead.querySelector('.drawer-close').addEventListener('click', closeDrawer);
    els.drawerBody.innerHTML = drawerBodyHTML(p);
    const snip = document.getElementById('embed-snippet');
    if (snip) snip.addEventListener('click', () => {
      navigator.clipboard?.writeText(snip.textContent).catch(() => {});
      const before = snip.style.color;
      snip.style.color = 'var(--link)';
      setTimeout(() => snip.style.color = before, 400);
    });
  }

  // ----- Init -----
  window.addEventListener('popstate', () => { state.route = parseRoute(); loadCurrent(); });
  (async () => {
    try {
      const res = await fetch(`data/index.json?v=${Date.now()}`);
      if (!res.ok) throw new Error('index.json missing');
      state.index = await res.json();
      state.route = parseRoute();
      await loadCurrent();
    } catch (e) {
      els.list.innerHTML = `<div class="empty">Couldn't load data/index.json. (${esc(e.message)})</div>`;
    }
  })();
})();
</script>
</body>
</html>
